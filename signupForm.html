<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <title>Document</title>
    <style>
        form {
            width: 80%;
            margin: auto;
        }

        form > h1{
            margin: 20px 0px;
        }

        form>h1 {
            text-align: center;
        }

        form>p {
            color: gray;
        }

        .phoneInputContainer {
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <form action="#" method="post">
        <h1>회원가입</h1>
        <input type="text" class="form-control" id="userId" name="userId" placeholder="아이디">
        <p id="idConfirm">*아이디는 6-12자 이내로 입력하세요.</p>
        <input type="password" class="form-control" id="userPw" name="userPw" placeholder="패스워드">
        <p id="pwConfirm">*비밀번호는 6-20자 이내로 입력하세요.<br>
            (영어 대소문자,숫자,특수문자 포함)
        </p>
        <input type="password" class="form-control" id="userPwCheck" name="userPwCheck" placeholder="패스워드 확인">

        <p id="pwcheckConfirm"></p>
        <div class="row phoneInputContainer">
            <div class="col-4">
                <select class="form-select" name="phone1" id="phone1">
                    <option value="선택" selected disabled>선택</option>
                    <option value="010">010</option>
                    <option value="011">011</option>
                    <option value="016">016</option>
                    <option value="017">017</option>
                    <option value="019">019</option>
                </select>
            </div>
            <div class="col-4">
                <input type="text" class="form-control" name="phone2" id="phone2" placeholder="">
            </div>
            <div class="col-4">
                <input type="text" class="form-control" name="phone3" id="phone3" placeholder="">
            </div>
        </div>
        <div class="row">
            <div class="col-6">
                <input type="text" class="form-control" id="postcode" name="postcode" placeholder="우편번호" onclick="execDaumPostcode()">
            </div>
            <div class="col-6">
                <input type="button" class="btn btn-primary col-12" onclick="execDaumPostcode()"
                    value="우편번호 찾기">
            </div>
        </div>
        <br>
        <div class="row">
            <div class="col-6">
                <input type="text" class="form-control" id="roadAddress" name="roadAddress" placeholder="도로명주소" onclick="execDaumPostcode()">
            </div>
            <div class="col-6">
                <input type="text" class="form-control" id="jibunAddress" name="jibunAddress" placeholder="지번주소" onclick="execDaumPostcode()">
            </div>
        </div>
        <br>
        <div class="row">
            <div class="col-6">
                <input type="text" class="form-control" id="detailAddress" name="detailAddress" placeholder="상세주소">
            </div>
            <div class="col-6">
                <input type="text" class="form-control" id="extraAddress" name="extraAddress" placeholder="읍/면/동" onclick="execDaumPostcode()">
            </div>
        </div>
        <br>
        <div class="row buttons">
            <div class="col-6"><button type="reset" id="btn_cancel" class="btn btn-secondary col-12">취소</button></div>
            <div class="col-6"><button type="button" id="btn_submit" class="btn btn-success col-12">완료</button></div>
        </div>

        <span id="guide" class="form-control" style="color:#999;display:none"></span>




    </form>

    <script>
        //inpit
        let userId = document.getElementById("userId");
        let userPw = document.getElementById("userPw");
        let userPwCheck = document.getElementById("userPwCheck");

        //input - phone
        let phone1 = document.getElementById("phone1");
        let phone2 = document.getElementById("phone2");
        let phone3 = document.getElementById("phone3");


        //input 이벤트 변경 될 p태그
        let idConfirm = document.getElementById("idConfirm");
        let pwConfirm = document.getElementById("pwConfirm");
        let pwcheckConfirm = document.getElementById("pwcheckConfirm");

        //buttons
        let btn_cancel = document.getElementById("btn_cancel");
        let btn_submit = document.getElementById("btn_submit");

        //상세주소
        let detailAddress = document.getElementById("detailAddress");

        //submit시 정규표현식에 만족하고 널값이 아닐때를 위한 Boolean
        let userIdRegexBool = false;
        let userIdNullBool = false;

        let userPwRegexBool = false;
        let userPwNullBool = false;

        let userPwCheckRegexBool = false;
        let userPwCheckNullBool = false;

        let userPwPhone1Bool = false;

        let userPwPhone2RegexBool = false;
        let userPwPhone2NullBool = false;

        let userPwPhone3RegexBool = false;
        let userPwPhone3NullBool = false;

        let detailAddressBool = false;

        userId.addEventListener("keyup", function () {
            let regexId = /^[a-zA-Z][a-zA-Z0-9]{5,11}$/g;
            if (!(regexId.test(userId.value))) {
                idConfirm.innerHTML = "형식에 맞춰 입력해주세요.";
                idConfirm.style.color = "red";
                userId.style.border = "2px solid red";
                userIdRegexBool = false;
            } else {
                idConfirm.innerHTML = "올바른 형식의 ID 입니다.";
                idConfirm.style.color = "green";
                userId.style.border = "2px solid green";
                userIdRegexBool = true;
            }
            if (userId.value == "") {
                idConfirm.innerHTML = "*아이디는 6-12자 이내로 입력하세요.";
                idConfirm.style.color = "gray";
                userId.style.border = "";
                userIdNullBool = false;
            } else {
                userIdNullBool = true;
            }
        })

        userPw.addEventListener("keyup", function () {
            let regexPw = /^[a-zA-Z0-9~!@#$%^&*+.]{6,20}$/g;

            pwcheckConfirm.innerHTML = "";
            pwcheckConfirm.style.color = "gray";
            userPwCheck.style.border = "";
            userPwCheck.value = "";

            if (!(regexPw.test(userPw.value))) {
                pwConfirm.innerHTML = "형식에 맞춰 입력해주세요.";
                pwConfirm.style.color = "red";
                userPw.style.border = "2px solid red";
                userPwRegexBool = false;
                return;
            } else {
                pwConfirm.innerHTML = "올바른 형식의 PassWord 입니다.";
                pwConfirm.style.color = "green";
                userPw.style.border = "2px solid green";
                userPwRegexBool = true;
                return;
            }
            if (userPw.value == "") {
                pwConfirm.innerHTML = "*비밀번호는 6-20자 이내로 입력하세요.<br>(영어 대소문자,숫자,특수문자 포함)";
                pwConfirm.style.color = "gray";
                userPw.style.border = "";
                userPwNullBool = false;
                return;
            } else {
                userPwNullBool = true;
                return;
            }

        })

        userPwCheck.addEventListener("keyup", function () {
            if (userPw.value == "") {
                pwcheckConfirm.innerHTML = "";
                pwcheckConfirm.style.color = "gray";
                userPwCheck.style.border = "2px solid red";
                userPwCheck.value = "";
            }

            if (userPw.value !== userPwCheck.value) {
                pwcheckConfirm.innerHTML = "비밀번호가 일치하지 않습니다";
                pwcheckConfirm.style.color = "red";
                userPwCheck.style.border = "2px solid red";
                userPwCheckRegexBool = false;
                return;
            } else {
                pwcheckConfirm.innerHTML = "비밀번호가 일치합니다.";
                pwcheckConfirm.style.color = "green";
                userPwCheck.style.border = "2px solid green";
                userPwCheckRegexBool = true;
                return;
            }

            if (userPwCheck.value == "") {
                pwcheckConfirm.innerHTML = "";
                pwcheckConfirm.style.color = "gray";
                userPwCheck.style.border = "2px solid red";
                userPwCheckNullBool = false;
                return;
            } else {
                userPwCheckNullBool = true;
                return;
            }

        })

        phone1.addEventListener("change", function () {
            phone1.style.border = "2px solid green";
            userPwPhone1Bool = true;
            phone2.focus();
        })

        phone2.addEventListener("keyup", function () {
            let regexId = /^[0-9]{4}$/g;
            if (!(regexId.test(phone2.value))) {
                phone2.style.border = "2px solid red";
                userPwPhone2RegexBool = false;
            } else {
                phone2.style.border = "2px solid green";
                userPwPhone2RegexBool = true;
                phone3.focus();
            }
            if (phone2.value == "") {
                phone2.style.border = "";
                userPwPhone2NullBool = false;
            } else {
                userPwPhone2NullBool = true;
            }
        })

        phone3.addEventListener("keyup", function () {
            let regexId = /^[0-9]{4}$/g;
            if (!(regexId.test(phone3.value))) {
                phone3.style.border = "2px solid red";
                userPwPhone3RegexBool = false;
            } else {
                phone3.style.border = "2px solid green";
                userPwPhone3RegexBool = true;
            }
            if (phone3.value == "") {
                phone3.style.border = "";
                userPwPhone3NullBool = false;
            } else {
                userPwPhone3NullBool = true;
            }
        })

        detailAddress.addEventListener("keyup", function () {
            if (detailAddress.value == "") {
                detailAddress.style.border = "2px solid red";
                // userPwNullBool = false;
                return;
            } else {
                detailAddress.style.border = "2px solid green";
                // userPwNullBool = true;
                return;
            }

        })

        btn_cancel.addEventListener("click", function () {
            idConfirm.innerHTML = "*아이디는 6-12자 이내로 입력하세요.";
            idConfirm.style.color = "gray";
            pwConfirm.innerHTML = "*비밀번호는 6-20자 이내로 입력하세요.<br>(영어 대소문자,숫자,특수문자 포함)";
            pwConfirm.style.color = "gray";
            pwcheckConfirm.innerHTML = "";
            pwcheckConfirm.style.color = "gray";

            userPw.style.border = "";
            userPwCheck.style.border = "";
            phone1.style.border = "";
            phone2.style.border = "";
            phone3.style.border = "";
            
            document.getElementById('postcode').style.border = "";
            document.getElementById('roadAddress').style.border = "";
            document.getElementById('jibunAddress').style.border = "";
            detailAddress.style.border = "";

            userIdRegexBool = false;
            userIdNullBool = false;

            userPwRegexBool = false;
            userPwNullBool = false;

            userPwCheckRegexBool = false;
            userPwCheckNullBool = false;

            userPwPhone1Bool = false;

            userPwPhone2RegexBool = false;
            userPwPhone2NullBool = false;

            userPwPhone3RegexBool = false;
            userPwPhone3NullBool = false;

            detailAddressBool = false;
            
        })


    </script>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <script>
        //본 예제에서는 도로명 주소 표기 방식에 대한 법령에 따라, 내려오는 데이터를 조합하여 올바른 주소를 구성하는 방법을 설명합니다.
        function execDaumPostcode() {
            new daum.Postcode({
                oncomplete: function (data) {
                    // 팝업에서 검색결과 항목을 클릭했을때 실행할 코드를 작성하는 부분.

                    // 도로명 주소의 노출 규칙에 따라 주소를 표시한다.
                    // 내려오는 변수가 값이 없는 경우엔 공백('')값을 가지므로, 이를 참고하여 분기 한다.
                    var roadAddr = data.roadAddress; // 도로명 주소 변수
                    var extraRoadAddr = ''; // 참고 항목 변수

                    // 법정동명이 있을 경우 추가한다. (법정리는 제외)
                    // 법정동의 경우 마지막 문자가 "동/로/가"로 끝난다.
                    if (data.bname !== '' && /[동|로|가]$/g.test(data.bname)) {
                        extraRoadAddr += data.bname;
                    }
                    // 건물명이 있고, 공동주택일 경우 추가한다.
                    if (data.buildingName !== '' && data.apartment === 'Y') {
                        extraRoadAddr += (extraRoadAddr !== '' ? ', ' + data.buildingName : data.buildingName);
                    }
                    // 표시할 참고항목이 있을 경우, 괄호까지 추가한 최종 문자열을 만든다.
                    if (extraRoadAddr !== '') {
                        extraRoadAddr = ' (' + extraRoadAddr + ')';
                    }

                    // 우편번호와 주소 정보를 해당 필드에 넣는다.
                    document.getElementById('postcode').value = data.zonecode;
                    document.getElementById('postcode').style.border = "2px solid green";
                    document.getElementById("roadAddress").value = roadAddr;
                    document.getElementById('roadAddress').style.border = "2px solid green";
                    document.getElementById("jibunAddress").value = data.jibunAddress;
                    document.getElementById('jibunAddress').style.border = "2px solid green";

                    document.getElementById('detailAddress').style.border = "2px solid red";
                    document.getElementById('detailAddress').focus();
                    detailAddressBool = false;

                    // 참고항목 문자열이 있을 경우 해당 필드에 넣는다.
                    if (roadAddr !== '') {
                        document.getElementById("extraAddress").value = extraRoadAddr;
                        document.getElementById('extraAddress').style.border = "2px solid green";
                    } else {
                        document.getElementById("extraAddress").value = '';
                        document.getElementById('extraAddress').style.border = "2px solid green";
                    }

                    var guideTextBox = document.getElementById("guide");
                    // 사용자가 '선택 안함'을 클릭한 경우, 예상 주소라는 표시를 해준다.
                    if (data.autoRoadAddress) {
                        var expRoadAddr = data.autoRoadAddress + extraRoadAddr;
                        guideTextBox.innerHTML = '(예상 도로명 주소 : ' + expRoadAddr + ')';
                        guideTextBox.style.display = 'block';

                    } else if (data.autoJibunAddress) {
                        var expJibunAddr = data.autoJibunAddress;
                        guideTextBox.innerHTML = '(예상 지번 주소 : ' + expJibunAddr + ')';
                        guideTextBox.style.display = 'block';
                    } else {
                        guideTextBox.innerHTML = '';
                        guideTextBox.style.display = 'none';
                    }
                }
            }).open();
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>

</body>

</html>
